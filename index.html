<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>療程用藥紀錄</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body class="bg-[#F5F5F0] overflow-x-hidden text-[#5C636A] font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Check, Plus, Trash2, Pill, Syringe, Clock, Info, Type, 
      CalendarCheck, Settings, BookOpen, ChevronLeft, ChevronRight, ListPlus
    } from 'lucide-react';

    // ====== Google Sheets (GAS) 串接網址設定 ======
    // TODO: 務必將您的 GAS 網址貼在下方引號內！
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxKXHlDFizkcCMc9cDlMh74hLmUKMpVxS-5YG50J0jkQqTgRzSOQVNHfgOExO4wsxTyBQ/exec'; 
    // ==============================================

    function App() {
      const [activeTab, setActiveTab] = useState('daily');
      const [currentDate, setCurrentDate] = useState(new Date());

      const [medLibrary, setMedLibrary] = useState([]);
      const [medications, setMedications] = useState([]);
      const [dailyRecords, setDailyRecords] = useState({});
      
      const [isLoading, setIsLoading] = useState(false);

      // ====== 雲端讀寫功能區塊 ======
      // 網頁載入時讀取資料
      useEffect(() => {
        if(!GAS_API_URL) return;
        setIsLoading(true);
        fetch(GAS_API_URL)
          .then(res => res.json())
          .then(data => {
            if(data.medLibrary) setMedLibrary(data.medLibrary);
            if(data.medications) setMedications(data.medications);
            if(data.dailyRecords) setDailyRecords(data.dailyRecords);
          })
          .catch(err => console.error("讀取失敗，請檢查網址或權限", err))
          .finally(() => setIsLoading(false));
      }, []);

      // 儲存資料到雲端
      const syncDataToCloud = (newLib, newMeds, newRecords) => {
        if(!GAS_API_URL) {
          console.warn("未設定 GAS 網址，僅儲存在暫存區");
          return;
        }
        
        const payload = {
          medLibrary: newLib || medLibrary,
          medications: newMeds || medications,
          dailyRecords: newRecords || dailyRecords
        };

        // 針對 Google Apps Script 調整的 Fetch 參數 (解決跨域阻擋問題)
        fetch(GAS_API_URL, {
          method: 'POST',
          redirect: 'follow', // 重要：GAS 會轉址，必須 follow
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', // 重要：避免觸發複雜 CORS preflight
          },
          body: JSON.stringify(payload)
        }).catch(err => console.error("儲存失敗", err));
      };
      // ==============================================

      const formatDateKey = (d) => {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const [newLibItem, setNewLibItem] = useState('');
      const handleLibAdd = (e) => {
        e.preventDefault();
        if (!newLibItem.trim() || medLibrary.includes(newLibItem.trim())) return;
        const newLib = [...medLibrary, newLibItem.trim()];
        setMedLibrary(newLib);
        setNewLibItem('');
        syncDataToCloud(newLib, null, null);
      };
      const handleLibDelete = (item) => {
        const newLib = medLibrary.filter(i => i !== item);
        setMedLibrary(newLib);
        syncDataToCloud(newLib, null, null);
      };

      const [setupData, setSetupData] = useState({
        name: '', appearance: '', efficacy: '',
        times: { morning: false, noon: false, night: false, bed: false },
        days: []
      });

      const next7Days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() + i);
        return d;
      });

      const handleSetupChange = (e) => {
        const { name, value } = e.target;
        setSetupData(prev => ({ ...prev, [name]: value }));
      };

      const handleSetupToggleTime = (time) => {
        setSetupData(prev => ({
          ...prev,
          times: { ...prev.times, [time]: !prev.times[time] }
        }));
      };

      const handleSetupToggleDay = (dateStr) => {
        setSetupData(prev => ({
          ...prev,
          days: prev.days.includes(dateStr) 
            ? prev.days.filter(d => d !== dateStr)
            : [...prev.days, dateStr]
        }));
      };

      const handleSetupSubmit = (e) => {
        e.preventDefault();
        if (!setupData.name) return alert('請選擇藥品');
        if (!Object.values(setupData.times).some(v => v)) return alert('請至少選擇一個時段');
        if (setupData.days.length === 0) return alert('請至少選擇一天');

        const newMeds = [...medications, { id: Date.now().toString(), ...setupData }];
        setMedications(newMeds);
        setSetupData({
          name: '', appearance: '', efficacy: '',
          times: { morning: false, noon: false, night: false, bed: false },
          days: []
        });
        syncDataToCloud(null, newMeds, null);
      };

      const handleSetupDelete = (id) => {
        const newMeds = medications.filter(m => m.id !== id);
        setMedications(newMeds);
        syncDataToCloud(null, newMeds, null);
      };

      const changeDate = (days) => {
        const d = new Date(currentDate);
        d.setDate(d.getDate() + days);
        setCurrentDate(d);
      };

      const toggleDailyRecord = (medId, timeKey) => {
        const dateKey = formatDateKey(currentDate);
        const newRecords = { ...dailyRecords };
        if (!newRecords[dateKey]) newRecords[dateKey] = {};
        
        const recordKey = `${medId}_${timeKey}`;
        newRecords[dateKey][recordKey] = !newRecords[dateKey][recordKey];
        
        setDailyRecords(newRecords);
        syncDataToCloud(null, null, newRecords);
      };

      const renderLibraryView = () => (
        <div className="space-y-6 pb-24">
          <header className="text-center pt-6 pb-2">
            <h1 className="text-2xl font-bold text-[#8A9A95] flex items-center justify-center gap-2">
              <BookOpen className="w-6 h-6" /> 藥品庫
            </h1>
            <p className="text-sm text-[#A3B1A6] mt-2">事先建檔可能用到的針劑與藥物</p>
          </header>
          <section className="bg-white p-5 rounded-2xl shadow-sm border border-[#E5E4DE] mx-4">
            <form onSubmit={handleLibAdd} className="flex gap-2">
              <input
                type="text"
                value={newLibItem}
                onChange={(e) => setNewLibItem(e.target.value)}
                placeholder="輸入藥物或針劑名稱..."
                className="flex-1 p-3 bg-[#FAFAFA] border border-[#E5E4DE] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#B3C0BA]"
              />
              <button type="submit" className="bg-[#A3B1A6] text-white p-3 rounded-xl hover:bg-[#8A9A95] transition-colors">
                <Plus className="w-6 h-6" />
              </button>
            </form>
          </section>
          <div className="mx-4 space-y-2">
            {medLibrary.map(item => (
              <div key={item} className="flex justify-between items-center p-4 bg-white rounded-xl border border-[#E5E4DE]">
                <span className="font-medium text-[#4A5568] flex items-center gap-2"><Pill className="w-4 h-4 text-[#A3B1A6]"/>{item}</span>
                <button onClick={() => handleLibDelete(item)} className="text-[#D1C8C1] hover:text-[#D98A8A]"><Trash2 className="w-5 h-5"/></button>
              </div>
            ))}
            {medLibrary.length === 0 && <p className="text-center text-[#B4A9A2] py-8">藥品庫目前空空如也</p>}
          </div>
        </div>
      );

      const renderSetupView = () => (
        <div className="space-y-6 pb-24">
          <header className="text-center pt-6 pb-2">
            <h1 className="text-2xl font-bold text-[#8A9A95] flex items-center justify-center gap-2">
              <Settings className="w-6 h-6" /> 藥單設定
            </h1>
            <p className="text-sm text-[#A3B1A6] mt-2">將藥品排入指定日期與時段</p>
          </header>

          <section className="bg-white p-5 rounded-2xl shadow-sm border border-[#E5E4DE] mx-4">
            <form onSubmit={handleSetupSubmit} className="space-y-4">
              <div className="space-y-1 relative">
                <label className="text-sm font-medium text-[#8F9CA4]">選擇藥品</label>
                <select name="name" value={setupData.name} onChange={handleSetupChange} className="w-full p-3 bg-[#FAFAFA] border border-[#E5E4DE] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#B3C0BA]">
                  <option value="">-- 請選擇 (從藥品庫抓取) --</option>
                  {medLibrary.map(item => <option key={item} value={item}>{item}</option>)}
                </select>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <input type="text" name="appearance" value={setupData.appearance} onChange={handleSetupChange} placeholder="外觀 (如: 白圓錠)" className="w-full p-3 bg-[#FAFAFA] border border-[#E5E4DE] rounded-xl text-sm" />
                <input type="text" name="efficacy" value={setupData.efficacy} onChange={handleSetupChange} placeholder="功效 (選填)" className="w-full p-3 bg-[#FAFAFA] border border-[#E5E4DE] rounded-xl text-sm" />
              </div>

              <div className="space-y-2">
                <label className="text-sm font-medium text-[#8F9CA4]">選擇用藥日期 (可複選)</label>
                <div className="flex gap-2 overflow-x-auto hide-scroll pb-2">
                  {next7Days.map(d => {
                    const dateStr = formatDateKey(d);
                    const isSelected = setupData.days.includes(dateStr);
                    return (
                      <button key={dateStr} type="button" onClick={() => handleSetupToggleDay(dateStr)} className={`flex-shrink-0 px-3 py-2 rounded-xl border text-sm transition-colors ${isSelected ? 'bg-[#8A9A95] text-white border-[#8A9A95]' : 'bg-[#FAFAFA] border-[#E5E4DE] text-[#8F9CA4]'}`}>
                        {d.getMonth()+1}/{d.getDate()}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="space-y-2">
                <label className="text-sm font-medium text-[#8F9CA4]">選擇時段 (可複選)</label>
                <div className="grid grid-cols-4 gap-2">
                  {Object.entries({ morning: '早上', noon: '中午', night: '晚上', bed: '睡前' }).map(([key, label]) => (
                    <button key={key} type="button" onClick={() => handleSetupToggleTime(key)} className={`py-2 rounded-xl border text-sm transition-colors ${setupData.times[key] ? 'bg-[#A3B1A6] text-white border-[#A3B1A6]' : 'bg-[#FAFAFA] border-[#E5E4DE] text-[#8F9CA4]'}`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              <button type="submit" className="w-full bg-[#A3B1A6] hover:bg-[#8A9A95] text-white py-3 rounded-xl flex justify-center items-center gap-2"><ListPlus className="w-5 h-5"/>加入排程</button>
            </form>
          </section>

          <div className="mx-4 space-y-3">
            <h3 className="font-medium text-[#8A9A95] pl-1">已設定排程</h3>
            {medications.map(med => (
              <div key={med.id} className="p-4 bg-white rounded-xl border border-[#E5E4DE] relative">
                <button onClick={() => handleSetupDelete(med.id)} className="absolute top-4 right-4 text-[#D1C8C1] hover:text-[#D98A8A]"><Trash2 className="w-4 h-4"/></button>
                <div className="font-medium text-[#4A5568]">{med.name}</div>
                <div className="text-xs text-[#8F9CA4] mt-1 space-y-1">
                  <div>📆 共 {med.days.length} 天設定</div>
                  <div>⏰ 時段: {['morning', 'noon', 'night', 'bed'].filter(k => med.times[k]).map(k => ({morning:'早',noon:'中',night:'晚',bed:'睡前'})[k]).join(', ')}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      const renderDailyView = () => {
        const currentDateKey = formatDateKey(currentDate);
        const todaysMeds = medications.filter(med => med.days.includes(currentDateKey));
        const timeBlocks = [
          { key: 'morning', label: '早上' },
          { key: 'noon', label: '中午' },
          { key: 'night', label: '晚上' },
          { key: 'bed', label: '睡前' }
        ];

        return (
          <div className="space-y-4 pb-24">
            <header className="bg-white border-b border-[#E5E4DE] sticky top-0 z-10 px-4 py-3 shadow-sm flex items-center justify-between">
              <button onClick={() => changeDate(-1)} className="p-2 text-[#8A9A95]"><ChevronLeft /></button>
              <h2 className="font-bold text-[#4A5568] text-lg">{currentDate.getMonth()+1}月{currentDate.getDate()}日 排程</h2>
              <button onClick={() => changeDate(1)} className="p-2 text-[#8A9A95]"><ChevronRight /></button>
            </header>
            
            <div className="px-4 space-y-6">
              {isLoading && <div className="text-center text-sm text-[#A3B1A6] py-4">正在同步雲端資料...</div>}
              
              {timeBlocks.map(({ key, label }) => {
                const medsInThisTime = todaysMeds.filter(m => m.times[key]);
                if (medsInThisTime.length === 0) return null;

                return (
                  <div key={key} className="space-y-2">
                    <h3 className="font-bold text-[#8A9A95] flex items-center gap-2 pl-1"><Clock className="w-4 h-4"/>{label}</h3>
                    {medsInThisTime.map(med => {
                      const recordKey = `${med.id}_${key}`;
                      const isTaken = dailyRecords[currentDateKey]?.[recordKey] || false;
                      
                      return (
                        <div key={recordKey} onClick={() => toggleDailyRecord(med.id, key)} className={`flex items-center gap-4 p-4 rounded-2xl border transition-all cursor-pointer ${isTaken ? 'bg-[#F9F9F8] border-[#E5E4DE] opacity-60' : 'bg-white border-[#D6DAD8] shadow-sm'}`}>
                          <div className={`flex-shrink-0 w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors ${isTaken ? 'bg-[#A3B1A6] border-[#A3B1A6] text-white' : 'border-[#B3C0BA] text-transparent'}`}>
                            <Check className="w-5 h-5" />
                          </div>
                          <div className="flex-1 min-w-0">
                            <h4 className={`font-medium text-lg truncate ${isTaken ? 'line-through text-[#9BA3A0]' : 'text-[#4A5568]'}`}>{med.name}</h4>
                            <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-[#8F9CA4] mt-0.5">
                              {med.appearance && <span className="flex items-center gap-1"><Type className="w-3 h-3"/>{med.appearance}</span>}
                              {med.efficacy && <span className="flex items-center gap-1"><Info className="w-3 h-3"/>{med.efficacy}</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
              {!isLoading && todaysMeds.length === 0 && <div className="text-center py-16 text-[#B4A9A2]">這天沒有排程藥物唷！</div>}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen relative w-full">
          {activeTab === 'daily' && renderDailyView()}
          {activeTab === 'setup' && renderSetupView()}
          {activeTab === 'library' && renderLibraryView()}

          <nav className="fixed bottom-0 w-full bg-white border-t border-[#E5E4DE] pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-50">
            <div className="flex justify-around items-center p-2">
              <button onClick={() => setActiveTab('daily')} className={`flex flex-col items-center p-2 w-20 transition-colors ${activeTab === 'daily' ? 'text-[#8A9A95]' : 'text-[#C4CACA]'}`}>
                <CalendarCheck className="w-6 h-6 mb-1" />
                <span className="text-[10px] font-medium">今日打卡</span>
              </button>
              <button onClick={() => setActiveTab('setup')} className={`flex flex-col items-center p-2 w-20 transition-colors ${activeTab === 'setup' ? 'text-[#8A9A95]' : 'text-[#C4CACA]'}`}>
                <Settings className="w-6 h-6 mb-1" />
                <span className="text-[10px] font-medium">藥單設定</span>
              </button>
              <button onClick={() => setActiveTab('library')} className={`flex flex-col items-center p-2 w-20 transition-colors ${activeTab === 'library' ? 'text-[#8A9A95]' : 'text-[#C4CACA]'}`}>
                <BookOpen className="w-6 h-6 mb-1" />
                <span className="text-[10px] font-medium">藥品庫</span>
              </button>
            </div>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
